{% extends "components/base.html" %}
{% block title %}Change Password — EduSphere{% endblock %}
{% block page_title %}Change Password{% endblock %}
{% block page_sub %}Update your account password{% endblock %}

{% block content %}
<div class="max-w-md" style="margin:0 auto;">
  <div class="card">
    <div class="card-head"><h5>Change Password</h5></div>
    <div class="card-body">
      <form method="POST" action="/student/change_password">
        <div class="form-group">
          <label class="form-label">Current Password</label>
          <input type="password" name="current_password" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" name="new_password" class="form-control" required>
          <div style="font-size:12px;color:var(--muted);margin-top:4px;">Min 6 characters</div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" name="confirm_password" class="form-control" required>
        </div>
        <div style="display:flex;gap:8px;margin-top:16px;">
          <button type="submit" class="btn btn-primary">Update Password</button>
          <a href="/student/profile" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
