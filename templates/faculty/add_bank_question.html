{% extends "components/base.html" %}
{% block title %}Add Bank Question — EduSphere{% endblock %}
{% block page_title %}Add to Question Bank{% endblock %}

{% block content %}
<div class="max-w-md">
  <div class="card">
    <div class="card-head">
      <h5><i class="bi bi-plus-circle" style="color:var(--primary);margin-right:6px;"></i>New Bank Question</h5>
    </div>
    <div class="card-body">
      <form method="POST" action="/add_bank_question">
        <div class="form-group">
          <label class="form-label">Question</label>
          <input type="text" name="question" class="form-control" placeholder="Question text" required>
        </div>
        <div class="form-group">
          <label class="form-label">Option A</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="radio" name="correct_option" value="o1" required style="width:20px;height:20px;">
            <input type="text" name="o1" class="form-control" placeholder="Enter option A" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Option B</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="radio" name="correct_option" value="o2" required style="width:20px;height:20px;">
            <input type="text" name="o2" class="form-control" placeholder="Enter option B" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Option C</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="radio" name="correct_option" value="o3" required style="width:20px;height:20px;">
            <input type="text" name="o3" class="form-control" placeholder="Enter option C" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Option D</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="radio" name="correct_option" value="o4" required style="width:20px;height:20px;">
            <input type="text" name="o4" class="form-control" placeholder="Enter option D" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Category</label>
            <input type="text" name="category" class="form-control" placeholder="e.g. Science">
          </div>
          <div class="form-group">
            <label class="form-label">Difficulty</label>
            <select name="difficulty" class="form-control">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Marks <span style="color:var(--danger)">*</span></label>
          <input type="number" name="marks" class="form-control" value="1" min="1" required>
          <div class="form-hint">Points for this question</div>
        </div>
        <div class="flex gap-3">
          <button type="submit" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Add</button>
          <a href="/question_bank" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
