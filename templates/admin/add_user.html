{% extends "components/base.html" %}
{% block title %}Add User — EduSphere{% endblock %}
{% block page_title %}Add User{% endblock %}
{% block page_sub %}Create a new account{% endblock %}
{% block topbar_actions %}
  <a href="/admin/users" class="btn btn-outline btn-sm"><i class="bi bi-arrow-left"></i> Back to Users</a>
{% endblock %}

{% block content %}
<div class="form-container-centered">
  <div class="card">
    <div class="card-head"><h5><i class="bi bi-person-plus-fill" style="color:var(--primary);margin-right:6px;"></i>New User</h5></div>
    <div class="card-body">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="Full name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Set a password" required>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select name="role" class="form-control">
            <option value="admin">Admin</option>
            <option value="faculty">Faculty</option>
            <option value="student" selected>Student</option>
          </select>
        </div>
        <div class="flex gap-3">
          <button type="submit" class="btn btn-primary"><i class="bi bi-person-plus"></i> Create User</button>
          <a href="/admin/users" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
